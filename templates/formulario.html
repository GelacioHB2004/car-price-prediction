<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>Predicción de Precio de Automóviles</title>
    <style>
        * { box-sizing: border-box; }

        body {
            font-family: 'Segoe UI', Arial, sans-serif;
            background: linear-gradient(135deg, #0f2027, #203a43, #2c5364);
            min-height: 100vh;
            margin: 0;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .card {
            background: #ffffff;
            border-radius: 16px;
            box-shadow: 0 20px 50px rgba(0,0,0,0.3);
            max-width: 560px;
            width: 100%;
            padding: 36px 40px;
        }

        h1 { font-size: 24px; color: #1c2b36; margin-bottom: 4px; }

        p.subtitle {
            color: #6b7c8a;
            margin-top: 0;
            margin-bottom: 28px;
            font-size: 14px;
        }

        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; }

        .field { margin-bottom: 16px; }
        .field.full { grid-column: 1 / -1; }

        label { display: block; font-size: 13px; font-weight: 600; color: #34495e; margin-bottom: 6px; }

        input, select {
            width: 100%;
            padding: 10px 12px;
            border: 1px solid #d6dde2;
            border-radius: 8px;
            font-size: 14px;
            color: #1c2b36;
            background: #f8fafb;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        input:focus, select:focus {
            outline: none;
            border-color: #2c5364;
            box-shadow: 0 0 0 3px rgba(44,83,100,0.15);
        }

        button {
            width: 100%;
            margin-top: 8px;
            padding: 13px;
            background: linear-gradient(135deg, #2c5364, #0f2027);
            color: #ffffff;
            border: none;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s, transform 0.1s;
        }

        button:hover { opacity: 0.9; }
        button:active { transform: scale(0.99); }

        /* Resultado siempre oculto hasta que se asigne clase */
        #resultado { display: none; margin-top: 22px; border-radius: 10px; overflow: hidden; }

        #resultado.visible { display: block; }

        .resultado-header {
            background: #1c2b36;
            color: #fff;
            text-align: center;
            padding: 12px 16px;
            font-size: 13px;
            font-weight: 600;
            letter-spacing: 0.5px;
            text-transform: uppercase;
        }

        .resultado-body {
            padding: 20px 16px;
            background: #f0f8f4;
            border: 1px solid #b9e3c4;
            border-top: none;
        }

        .precio-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 0;
            border-bottom: 1px solid #d4eedd;
            font-size: 14px;
            color: #34495e;
        }

        .precio-row:last-child { border-bottom: none; }

        .precio-row .label { font-weight: 600; }

        .precio-row .valor {
            font-size: 18px;
            font-weight: 700;
            color: #1f7a3d;
        }

        .precio-row .valor.real { color: #2c5364; }

        .precio-row .valor.diff-pos { color: #b3261e; }
        .precio-row .valor.diff-neg { color: #1f7a3d; }

        #resultado.error-box {
            display: block;
            background: #fdecea;
            color: #b3261e;
            border: 1px solid #f5c2c0;
            padding: 16px;
            text-align: center;
            font-size: 15px;
        }

        .footer-note {
            margin-top: 18px;
            font-size: 12px;
            color: #9aa7b0;
            text-align: center;
        }

        .real-price-section {
            margin-top: 16px;
            padding: 12px;
            background: #eef6fb;
            border: 1px dashed #90bdd4;
            border-radius: 8px;
        }

        .real-price-section label {
            color: #2c5364;
            margin-bottom: 6px;
        }
    </style>
</head>
<body>
    <div class="card">
        <h1>🚗 Predicción de Precio de Automóviles</h1>
        <p class="subtitle">Modelo de Random Forest Regressor &middot; Ingresa los datos del vehículo</p>

        <form id="formulario" onsubmit="predecirPrecio(event)">
            <div class="grid">
                <div class="field">
                    <label for="brand">Marca</label>
                    <select id="brand" name="brand" required>
                        {% for b in brands %}
                        <option value="{{ b }}">{{ b }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label for="year">Año</label>
                    <input type="number" id="year" name="year" min="1990" max="2026" value="2018" required>
                </div>

                <div class="field">
                    <label for="mileage">Kilometraje (km)</label>
                    <input type="number" id="mileage" name="mileage" min="0" value="80000" required>
                </div>

                <div class="field">
                    <label for="engine_size">Tamaño de Motor (L)</label>
                    <input type="number" id="engine_size" name="engine_size" min="0.5" max="8" step="0.1" value="2.5" required>
                </div>

                <div class="field">
                    <label for="fuel_type">Tipo de Combustible</label>
                    <select id="fuel_type" name="fuel_type" required>
                        {% for f in fuel_types %}
                        <option value="{{ f }}">{{ f }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field">
                    <label for="transmission">Transmisión</label>
                    <select id="transmission" name="transmission" required>
                        {% for t in transmissions %}
                        <option value="{{ t }}">{{ t }}</option>
                        {% endfor %}
                    </select>
                </div>

                <div class="field full">
                    <label for="condition">Condición</label>
                    <select id="condition" name="condition" required>
                        {% for c in conditions %}
                        <option value="{{ c }}">{{ c }}</option>
                        {% endfor %}
                    </select>
                </div>
            </div>

            <!-- Precio real opcional para comparar -->
            <div class="real-price-section">
                <label for="precio_real">💡 Precio real del vehículo (opcional, para comparar)</label>
                <input type="number" id="precio_real" name="precio_real" min="0" step="0.01" placeholder="Ej: 52993.45">
            </div>

            <button type="submit">Predecir Precio</button>
        </form>

        <div id="resultado"></div>

        <p class="footer-note">Modelo entrenado con Random Forest &middot; Validación cruzada cv=7</p>
    </div>

    <script>
        function fmt(num) {
            return num.toLocaleString('en-US', { minimumFractionDigits: 2, maximumFractionDigits: 2 });
        }

        function predecirPrecio(event) {
            event.preventDefault();

            const form = document.getElementById('formulario');
            const formData = new URLSearchParams(new FormData(form));
            const resultado = document.getElementById('resultado');
            const precioRealInput = document.getElementById('precio_real').value;

            // Resetear sin inline style
            resultado.className = '';
            resultado.innerHTML = '';

            fetch('/predict', {
                method: 'POST',
                headers: { 'Content-Type': 'application/x-www-form-urlencoded' },
                body: formData.toString()
            })
            .then(response => response.json())
            .then(data => {
                if (data.error) {
                    resultado.className = 'error-box';
                    resultado.innerHTML = '❌ Error: ' + data.error;
                } else {
                    const predicho = data.precio_estimado;
                    let html = `
                        <div class="resultado-header">📊 Resultado de la Predicción</div>
                        <div class="resultado-body">
                            <div class="precio-row">
                                <span class="label">💰 Precio predicho</span>
                                <span class="valor">$${fmt(predicho)}</span>
                            </div>`;

                    if (precioRealInput !== '' && !isNaN(parseFloat(precioRealInput))) {
                        const real = parseFloat(precioRealInput);
                        const diff = predicho - real;
                        const diffAbs = Math.abs(diff);
                        const pct = ((diffAbs / real) * 100).toFixed(2);
                        const signo = diff >= 0 ? '+' : '-';
                        const diffClass = diff >= 0 ? 'diff-pos' : 'diff-neg';
                        const emoji = diff >= 0 ? '🔺' : '🔻';

                        html += `
                            <div class="precio-row">
                                <span class="label">🏷️ Precio real</span>
                                <span class="valor real">$${fmt(real)}</span>
                            </div>
                            <div class="precio-row">
                                <span class="label">${emoji} Diferencia</span>
                                <span class="valor ${diffClass}">${signo}$${fmt(diffAbs)} (${signo}${pct}%)</span>
                            </div>`;
                    }

                    html += `</div>`;
                    resultado.className = 'visible';
                    resultado.innerHTML = html;
                }
            })
            .catch(error => {
                resultado.className = 'error-box';
                resultado.innerHTML = '❌ Error en la solicitud.';
                console.error('Error:', error);
            });
        }
    </script>
</body>
</html>
